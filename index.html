<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
  :root{
    --bg:#FFFFFF; --ink:#000000; --soft:#8A8A8A; --clay:#000000; --sage:#000000; --line:#E2E2E2; --card:#FFFFFF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Hanken Grotesk', system-ui, -apple-system, sans-serif;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:820px; margin:0 auto; padding:28px 20px 80px;}
  header{border-bottom:2px solid var(--ink); padding-bottom:14px; margin-bottom:26px;}
  .masthead{display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px;}
  .kicker{text-transform:uppercase; letter-spacing:3px; font-size:12px; color:var(--clay); font-weight:700;}
  .yr{font-size:12px; color:var(--soft); letter-spacing:1px;}
  h1{font-family:'Fraunces',serif; font-weight:900; font-size:clamp(48px,13vw,96px); line-height:.92; margin:8px 0 0; letter-spacing:-.02em;}
  .progress{display:flex; align-items:center; gap:18px; margin-bottom:32px; flex-wrap:wrap;}
  .plabel{font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--soft); margin-bottom:6px;}
  .bar{height:12px; background:var(--line); border-radius:20px; overflow:hidden;}
  .fill{height:100%; background:var(--ink); transition:width .4s ease;}
  .pct{font-family:'Fraunces',serif; font-weight:900; font-size:38px; line-height:1; color:var(--clay);}
  .pcs{font-size:12px; color:var(--soft);}
  section{margin-bottom:38px;}
  h2{font-family:'Fraunces',serif; font-weight:600; font-size:24px; margin:0 0 14px; display:flex; align-items:center; gap:10px;}
  .dot{width:10px; height:10px; border-radius:50%; display:inline-block;}
  .goals{background:var(--card); border:1px solid var(--line); border-radius:6px; padding:18px 20px; margin-bottom:30px;}
  .glabel{font-family:'Fraunces',serif; font-weight:600; font-size:18px; margin-bottom:12px;}
  .glist{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px;}
  .gitem{display:flex; align-items:baseline; gap:10px; font-size:14px;}
  .gtext{flex:1;}
  .gcount{flex-shrink:0; font-weight:700; font-size:13px;}
  .gdot{width:8px; height:8px; border-radius:50%; flex-shrink:0; position:relative; top:1px;}
  .gname{font-weight:600;}
  .gstar{color:var(--clay); margin-right:2px;}
  .gtarget{color:var(--soft); font-style:italic; font-size:12px;}
  .anchor{background:var(--card); border:1px solid var(--line); border-radius:4px; padding:14px 16px; margin-bottom:18px;}
  .alabel{font-size:11px; letter-spacing:2px; text-transform:uppercase; font-weight:700; margin-bottom:6px;}
  .arow{display:flex; align-items:center; gap:12px;}
  .atext{font-family:'Fraunces',serif; font-size:21px; font-weight:600; cursor:text; flex:1;}
  .atick{width:26px; height:26px; flex-shrink:0; border:2px solid var(--ink); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:16px; line-height:1; cursor:pointer; color:transparent; transition:transform .1s ease;}
  .atick:active{transform:scale(.9);}
  .atick.on{background:var(--ink); color:#fff;}
  .ainput{width:100%; border:none; background:transparent; font-family:'Fraunces',serif; font-size:21px; color:var(--ink); padding:2px 0;}
  .ainput:focus{outline:none;}
  .habit{margin-bottom:20px;}
  .hrow{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:8px;}
  .hname{font-weight:600; font-size:15px;}
  .htarget{font-size:11px; color:var(--soft); font-style:italic;}
  .hmeta{display:flex; align-items:center; gap:12px; flex-shrink:0;}
  .hcount{font-size:12px; color:var(--soft);}
  .rm{cursor:pointer; color:var(--line); font-size:20px; line-height:1; padding:0 2px;}
  .rm:active{color:var(--clay);}
  .grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; max-width:360px;}
  .wd{text-align:center; font-size:10px; color:var(--soft); font-weight:600;}
  .cell{aspect-ratio:1; border-radius:6px; background:var(--card); border:1px solid var(--line); color:var(--soft); font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:600; cursor:pointer; transition:transform .1s ease;}
  .cell:active{transform:scale(.9);}
  .cell.on{color:#fff;}
  .addrow{display:flex; gap:8px; margin-top:4px; max-width:360px;}
  .addrow input{flex:1; border:1px solid var(--line); background:var(--card); border-radius:4px; padding:9px 12px; font-size:14px; color:var(--ink); font-family:'Hanken Grotesk';}
  .addrow input:focus{outline:none; border-color:var(--soft);}
  .addbtn{border:none; color:#fff; border-radius:4px; padding:0 16px; font-weight:700; font-size:14px; cursor:pointer;}
  footer{border-top:1px solid var(--line); padding-top:16px; font-size:12px; color:var(--soft); font-style:italic; font-family:'Fraunces',serif;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const DAYS=31, LEAD=2; // July 1 2026 is a Wednesday → 2 leading blanks (Mon-first grid)
const WD=["M","T","W","T","F","S","S"];
const KEY="july-tracker-app";
const CATS=[
  {cat:"work", label:"Main Goal", accent:"#000000", anchorKey:"work", hint:"e.g. Weight = 63kg"},
  {cat:"health", label:"Health & Fitness", accent:"#000000", anchorKey:null, hint:""},
  {cat:"nutrition", label:"Nutrition", accent:"#000000", anchorKey:null, hint:""},
  {cat:"learning", label:"Mandarin", accent:"#000000", anchorKey:null, hint:""}
];
const DEFAULTS={
  anchors:{work:"Weight = 63kg", health:""},
  anchorDone:{},
  habits:[
    {id:"g",cat:"health",name:"Gym session",target:"3× per week"},
    {id:"sp",cat:"health",name:"Spin session",target:"2× per week"},
    {id:"mma",cat:"health",name:"MMA/BJJ",target:""},
    {id:"pil",cat:"health",name:"Pilates/Yoga",target:""},
    {id:"p",cat:"nutrition",name:"120g protein",target:"daily"},
    {id:"d",cat:"nutrition",name:"Calorie deficit",target:"daily"},
    {id:"s",cat:"health",name:"10k steps",target:"daily avg"},
    {id:"m",cat:"learning",name:"Mandarin lesson",target:"2× per week"}
  ],
  completions:{}
};
let data, editing=null;
function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(!raw){ data=structuredClone(DEFAULTS); return; }
    const saved=JSON.parse(raw);
    data=Object.assign({}, DEFAULTS, saved); // brings saved anchors + check-marks
    // The habit list always follows the latest defaults, so adding/removing/renaming a goal
    // here always takes effect. Check-marks live separately (keyed by id:day) so they persist;
    // any left over from a removed goal are simply ignored.
    data.habits=DEFAULTS.habits.slice();
  }catch(e){ data=structuredClone(DEFAULTS); }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){ console.warn("save failed",e); } }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const WEEKS_IN_MONTH=4.43; // July 2026 spans ~4.43 weeks (31 days)
function monthlyTarget(t){
  t=(t||"").toLowerCase();
  const m=t.match(/(\d+)\s*[×x]?\s*per\s*week/);
  if(m) return Math.round(parseInt(m[1],10)*WEEKS_IN_MONTH);
  return DAYS; // daily / daily avg / unspecified
}
function render(){
  let total=0, possible=0;
  data.habits.forEach(h=>{
    if(!h.target) return; // goals with no frequency target don't affect the overall %
    let d=0; for(let dd=1;dd<=DAYS;dd++) if(data.completions[h.id+":"+dd]) d++;
    const tg=monthlyTarget(h.target);
    total+=Math.min(d,tg); possible+=tg;
  });
  const pct=possible?Math.round(total/possible*100):0;
  let html=`
  <header>
    <div class="masthead">
      <div class="kicker">The Monthly Almanac</div>
    </div>
    <h1>July <span style="font-weight:400;color:var(--soft)">2026</span></h1>
  </header>`;
  // goals at a glance
  let goalItems="";
  CATS.forEach(g=>{
    const av=g.anchorKey?(data.anchors[g.anchorKey]||"").trim():"";
    if(av){
      goalItems+=`<li class="gitem"><span class="gdot" style="background:${g.accent}"></span><span class="gtext"><span class="gstar">★</span><span class="gname">${esc(av)}</span></span></li>`;
    }
    data.habits.filter(h=>h.cat===g.cat).forEach(h=>{
      let done=0; for(let dd=1;dd<=DAYS;dd++) if(data.completions[h.id+":"+dd]) done++;
      const cnt=h.target?`${done}/${monthlyTarget(h.target)}`:`${done}`;
      goalItems+=`<li class="gitem"><span class="gdot" style="background:${g.accent}"></span><span class="gtext"><span class="gname">${esc(h.name)}</span>${h.target?` <span class="gtarget">${esc(h.target)}</span>`:""}</span><span class="gcount" style="color:${g.accent}">${cnt}</span></li>`;
    });
  });
  html+=`<div class="goals"><div class="glabel">This Month's Goals</div><ul class="glist">${goalItems}</ul></div>`;
  html+=`
  <div class="progress">
    <div style="flex:1 1 200px">
      <div class="plabel">Month progress</div>
      <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
    </div>
    <div style="text-align:right">
      <div class="pct">${pct}%</div>
      <div class="pcs">${total} of ${possible} checks</div>
    </div>
  </div>`;
  CATS.forEach(g=>{
    const av=data.anchors[g.anchorKey]||"";
    html+=`<section><h2><span class="dot" style="background:${g.accent}"></span>${g.label}</h2>`;
    // anchor (only for categories that have one)
    if(g.anchorKey){
      if(editing===g.anchorKey){
        html+=`<div class="anchor" style="border-left:5px solid ${g.accent}">
          <div class="alabel" style="color:${g.accent}">★ Anchor Goal</div>
          <input class="ainput" id="anchor-input" style="border-bottom:1px dashed ${g.accent}" value="${esc(av)}" placeholder="${esc(g.hint)}">
        </div>`;
      } else {
        const adone=!!(data.anchorDone&&data.anchorDone[g.anchorKey]);
        html+=`<div class="anchor" style="border-left:5px solid ${g.accent}">
          <div class="alabel" style="color:${g.accent}">★ Anchor Goal</div>
          <div class="arow">
            <div class="atext" style="color:${av?'var(--ink)':'var(--soft)'};${adone?'text-decoration:line-through;opacity:.55':''}" onclick="startEdit('${g.anchorKey}')">${av?esc(av):esc(g.hint)}</div>
            <div class="atick ${adone?'on':''}" onclick="toggleAnchor('${g.anchorKey}')">✓</div>
          </div>
        </div>`;
      }
    }
    // habits
    data.habits.filter(h=>h.cat===g.cat).forEach(h=>{
      let done=0; for(let dd=1;dd<=DAYS;dd++) if(data.completions[h.id+":"+dd]) done++;
      const tgt=monthlyTarget(h.target);
      const countLabel=h.target?`${done}/${tgt}`:`${done}`;
      html+=`<div class="habit">
        <div class="hrow">
          <span><span class="hname">${esc(h.name)}</span>${h.target?` <span class="htarget">· ${esc(h.target)}</span>`:""}</span>
          <span class="hmeta"><span class="hcount">${countLabel}</span><span class="rm" onclick="removeHabit('${h.id}')">×</span></span>
        </div>
        <div class="grid">`;
      WD.forEach(w=> html+=`<div class="wd">${w}</div>`);
      for(let i=0;i<LEAD;i++) html+=`<div></div>`;
      for(let dd=1;dd<=DAYS;dd++){
        const on=!!data.completions[h.id+":"+dd];
        html+=`<div class="cell ${on?'on':''}" style="${on?`background:${g.accent};border-color:${g.accent}`:''}" onclick="toggle('${h.id}',${dd})">${dd}</div>`;
      }
      html+=`</div></div>`;
    });
    html+=`</section>`;
  });
  html+=`<footer>Tap any day to mark it done. Tap a goal to edit it. Everything saves on your phone.</footer>`;
  document.getElementById("app").innerHTML=html;
  if(editing){
    const inp=document.getElementById("anchor-input");
    if(inp){
      inp.focus();
      const v=inp.value; inp.value=""; inp.value=v; // caret to end
      inp.addEventListener("blur",()=>{ data.anchors[editing]=inp.value.trim(); editing=null; save(); render(); });
      inp.addEventListener("keydown",e=>{ if(e.key==="Enter") inp.blur(); });
    }
  }
}
function toggle(id,day){
  const k=id+":"+day;
  if(data.completions[k]) delete data.completions[k]; else data.completions[k]=true;
  save(); render();
}
function toggleAnchor(key){
  if(!data.anchorDone) data.anchorDone={};
  data.anchorDone[key]=!data.anchorDone[key];
  save(); render();
}
function startEdit(key){ editing=key; render(); }
function addHabit(cat){
  const el=document.getElementById("add-"+cat);
  const name=(el.value||"").trim(); if(!name) return;
  data.habits.push({id:cat[0]+Date.now(), cat, name, target:""});
  el.value=""; save(); render();
}
function removeHabit(id){
  data.habits=data.habits.filter(h=>h.id!==id);
  Object.keys(data.completions).forEach(k=>{ if(k.indexOf(id+":")===0) delete data.completions[k]; });
  save(); render();
}
load(); render();
</script>
</body>
</html>
