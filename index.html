<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>July 2026 Habit Tracker</title>
<style>
  :root {
    --bg: #faf9f5;
    --surface: #ffffff;
    --border: #e6e3da;
    --border-strong: #cbc7ba;
    --text: #1f1e1b;
    --text-muted: #6b6862;
    --accent: #1d9e75;
    --accent-soft: #e1f5ee;
    --weekend: #f5f3ec;
    --today: #fff6df;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --check-on: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1917;
      --surface: #242320;
      --border: #38352f;
      --border-strong: #4a463f;
      --text: #f0eee8;
      --text-muted: #a3a097;
      --accent: #5dcaa5;
      --accent-soft: #123a2e;
      --weekend: #201f1c;
      --today: #33290f;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --check-on: #06231a;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 1.5rem 1rem 4rem;
  }
  .wrap { max-width: 520px; margin: 0 auto; }
  h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 0.25rem; }
  .sub { color: var(--text-muted); font-size: 0.9rem; margin: 0 0 1.25rem; }
  .toolbar { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
  button {
    font: inherit; font-size: 0.9rem; cursor: pointer;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: 10px;
    padding: 0.6rem 1rem; transition: background 0.12s, border 0.12s;
    min-height: 44px; flex: 1;
  }
  button:active { background: var(--accent-soft); border-color: var(--accent); }

  .cards { display: flex; flex-direction: column; gap: 1rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); padding: 1rem 1rem 1.15rem; }
  .card-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.85rem; }
  .card-head input {
    flex: 1; border: none; background: transparent; color: var(--text);
    font-size: 1.1rem; font-weight: 600; padding: 0.3rem 0; min-width: 0;
  }
  .card-head input:focus { outline: none; border-bottom: 1px dashed var(--accent); }
  .badge { font-size: 0.8rem; font-weight: 600; color: var(--accent); background: var(--accent-soft); border-radius: 999px; padding: 0.25rem 0.65rem; white-space: nowrap; }
  .del { border: none; background: transparent; color: var(--text-muted); font-size: 1.4rem; line-height: 1; padding: 0.25rem 0.5rem; min-height: 0; flex: 0 0 auto; }
  .del:active { color: var(--accent); }
  .dow-grid, .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .dow-grid { margin-bottom: 5px; }
  .dow-grid span { text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--text-muted); }
  .day {
    aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border); border-radius: 10px; font-size: 0.9rem; font-weight: 600;
    color: var(--text); cursor: pointer; user-select: none; background: var(--surface);
  }
  .day.blank { border: none; background: transparent; cursor: default; }
  .day.weekend { background: var(--weekend); }
  .day.today { box-shadow: inset 0 0 0 2px var(--accent); }
  .day.done { background: var(--accent); color: var(--check-on); border-color: var(--accent); }
  .day.done::after { content: "✓"; }
  .day.done .n { display: none; }
  .hint { color: var(--text-muted); font-size: 0.8rem; margin-top: 1.5rem; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>July 2026 · habits</h1>
  <p class="sub">Tap a day to mark it done. Tap a name to rename. Saves automatically.</p>

  <div class="toolbar">
    <button id="addBtn">+ Add habit</button>
    <button id="resetBtn">Reset month</button>
  </div>

  <div class="cards" id="cards"></div>

  <p class="hint">Host this file on GitHub Pages — your check-marks live in this browser.</p>
</div>

<script>
  const YEAR = 2026, MONTH = 6; // July (0-indexed)
  const DAYS = new Date(YEAR, MONTH + 1, 0).getDate(); // 31
  const FIRST_DOW = new Date(YEAR, MONTH, 1).getDay(); // 0=Sun
  const DOW = ["Su","Mo","Tu","We","Th","Fr","Sa"];
  const STORAGE = "habits-2026-07";
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === YEAR && today.getMonth() === MONTH;
  const todayDate = isCurrentMonth ? today.getDate() : -1;

  const DEFAULT_HABITS = ["Drink water", "Exercise", "Read", "Sleep 8h", "No sugar", "Meditate"];

  let state = load();

  function load() {
    try { const raw = localStorage.getItem(STORAGE); if (raw) return JSON.parse(raw); } catch (e) {}
    return { habits: DEFAULT_HABITS.map(name => ({ name, done: {} })) };
  }
  function save() { localStorage.setItem(STORAGE, JSON.stringify(state)); }
  function isWeekend(day) { const d = new Date(YEAR, MONTH, day).getDay(); return d === 0 || d === 6; }
  function toggle(habit, d) { if (habit.done[d]) delete habit.done[d]; else habit.done[d] = true; save(); render(); }

  function render() {
    const cards = document.getElementById("cards");
    cards.innerHTML = "";
    state.habits.forEach((habit, hi) => {
      const card = document.createElement("div");
      card.className = "card";

      const head = document.createElement("div");
      head.className = "card-head";
      const input = document.createElement("input");
      input.value = habit.name;
      input.setAttribute("aria-label", "Habit name");
      input.addEventListener("input", () => { habit.name = input.value; save(); });
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = Object.keys(habit.done).length + " / " + DAYS;
      const del = document.createElement("button");
      del.className = "del"; del.textContent = "×"; del.title = "Delete habit";
      del.setAttribute("aria-label", "Delete habit");
      del.addEventListener("click", () => {
        if (confirm('Delete "' + habit.name + '"?')) { state.habits.splice(hi, 1); save(); render(); }
      });
      head.appendChild(input); head.appendChild(badge); head.appendChild(del);
      card.appendChild(head);

      const dowGrid = document.createElement("div");
      dowGrid.className = "dow-grid";
      DOW.forEach(d => { const s = document.createElement("span"); s.textContent = d; dowGrid.appendChild(s); });
      card.appendChild(dowGrid);

      const grid = document.createElement("div");
      grid.className = "day-grid";
      for (let i = 0; i < FIRST_DOW; i++) {
        const blank = document.createElement("div");
        blank.className = "day blank";
        grid.appendChild(blank);
      }
      for (let d = 1; d <= DAYS; d++) {
        const cell = document.createElement("div");
        const done = !!habit.done[d];
        cell.className = "day " + [isWeekend(d) ? "weekend" : "", d === todayDate ? "today" : "", done ? "done" : ""].filter(Boolean).join(" ");
        cell.innerHTML = '<span class="n">' + d + '</span>';
        cell.addEventListener("click", () => toggle(habit, d));
        grid.appendChild(cell);
      }
      card.appendChild(grid);
      cards.appendChild(card);
    });
  }

  document.getElementById("addBtn").addEventListener("click", () => {
    state.habits.push({ name: "New habit", done: {} }); save(); render();
  });
  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Reset all habits and check-marks for July?")) {
      state = { habits: DEFAULT_HABITS.map(name => ({ name, done: {} })) }; save(); render();
    }
  });

  render();
</script>
</body>
</html>
